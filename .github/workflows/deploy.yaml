name: Deploy
on:
  schedule:
    # Full redeploy every day at 06:30 UTC
    - cron: "30 6 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  fast-deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: src
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: pages
      - name: Patch index and quiz on gh-pages
        working-directory: pages
        run: |
          git config user.name "GithubAction"
          git config user.email "username@users.noreply.github.com"
          cp ../src/index.html .
          rm -rf quiz
          cp -r ../src/quiz .
          git add index.html quiz
          if git diff --cached --quiet; then
            echo "No changes to deploy"; exit 0
          fi
          git commit -m "Fast deploy ${GITHUB_SHA::7}"
          git push origin gh-pages

  full-deploy:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: deodat-pere/agregcine
          path: agregcine
      - name: Compile scraper
        run: |
          cp scraper-config.json agregcine/scraper/config.json
          cd agregcine/scraper
          cargo build
      - name: Scrape
        run: |
          cd agregcine/scraper
          target/debug/scraper
      - name: Build cinema frontend
        run: |
          cd agregcine/frontend
          npm install
          npm run build -- --base=/cine-paris/
      - name: Patch cinema index.html for subpath routing
        # Strips the /cine-paris prefix before React boots so React Router
        # matches routes without needing basename set in the source.
        run: |
          sed -i 's|<script type="module"|<script>(function(){var b="/cine-paris",p=location.pathname;if(p.startsWith(b))history.replaceState(null,"",p.slice(b.length)||"/");})();</script><script type="module"|' agregcine/frontend/dist/index.html
      - name: Deploy
        run: |
          git config --global user.name "GithubAction"
          git config --global user.email "username@users.noreply.github.com"
          git checkout -b gh-pages
          mkdir -p cine-paris assets
          cp -r agregcine/frontend/dist/* cine-paris/
          cp agregcine/scraper/movies.json assets/
          cp -r quiz .
          cp cine-paris/index.html 404.html
          rm -rf agregcine scraper-config.json .github
          echo "deod.at" > CNAME
          git add .
          git commit -m "Daily deployment"
          git push --force origin gh-pages
