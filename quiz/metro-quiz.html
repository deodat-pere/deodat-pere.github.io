<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Métro Parisien</title>
<link rel="icon" type="image/svg+xml" href="metro-m.svg">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                 "Helvetica Neue", Arial, sans-serif;
    overflow: hidden;
  }
  #app { display: flex; flex-direction: column; height: 100vh; }
  header {
    padding: 10px 16px 12px;
    background: #1a1a2e;
    color: white;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    z-index: 500;
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  header h1 {
    margin: 0;
    font-size: 0.85em;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    opacity: 0.65;
  }
  #timer {
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-variant-numeric: tabular-nums;
    font-size: 1.1em;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .prompt-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 4px 0 2px;
  }
  #prompt {
    flex: 1;
    font-size: 1.5em;
    font-weight: 600;
    line-height: 1.2;
    min-height: 1.2em;
    text-align: center;
  }
  .nav-btn {
    background: rgba(255, 255, 255, 0.12);
    border: none;
    color: white;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    font-size: 1.4em;
    font-weight: 600;
    line-height: 1;
    padding: 0;
    cursor: pointer;
    flex: 0 0 auto;
    transition: background 0.15s;
  }
  .nav-btn:hover:not(:disabled),
  .nav-btn:focus-visible:not(:disabled) {
    background: rgba(255, 255, 255, 0.25);
    outline: none;
  }
  .nav-btn:disabled {
    opacity: 0.25;
    cursor: not-allowed;
  }
  #score {
    font-size: 0.9em;
    opacity: 0.8;
  }
  #map { flex: 1; background: #f4f4f4; }
  #map.loading { opacity: 0.4; }

  .station-dot { cursor: pointer; }

  #end-screen {
    position: fixed; inset: 0;
    background: rgba(26, 26, 46, 0.94);
    color: white;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 1000;
    padding: 24px;
    text-align: center;
  }
  #end-screen h2 { margin: 0 0 8px; font-size: 2em; }
  #end-screen .score-line { font-size: 1.3em; margin: 8px 0 20px; }
  .end-buttons {
    display: flex; gap: 10px; flex-wrap: wrap;
    justify-content: center;
  }
  #replay-btn {
    background: #e94560; color: white; border: none;
    padding: 12px 28px; font-size: 1.05em; font-weight: 600;
    border-radius: 6px; cursor: pointer;
  }
  #replay-btn:hover { background: #ff5773; }
  #explore-btn {
    background: transparent; color: white;
    border: 1px solid rgba(255, 255, 255, 0.4);
    padding: 12px 24px; font-size: 1.05em; font-weight: 500;
    border-radius: 6px; cursor: pointer;
  }
  #explore-btn:hover { background: rgba(255, 255, 255, 0.1); }

  #line-selection {
    position: fixed; inset: 0;
    background: rgba(26, 26, 46, 0.97);
    color: white;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 1000;
    padding: 24px;
    text-align: center;
    overflow-y: auto;
  }
  #line-selection h2 { margin: 0 0 6px; font-size: 2em; }
  .sel-subtitle { margin: 0 0 22px; opacity: 0.65; font-size: 0.95em; }
  #line-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    max-width: 500px;
    margin-bottom: 28px;
  }
  .line-label {
    cursor: pointer;
    user-select: none;
  }
  .line-label input { display: none; }
  .line-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 52px;
    height: 38px;
    padding: 0 12px;
    border-radius: 19px;
    font-weight: 700;
    font-size: 0.95em;
    border: 3px solid transparent;
    transition: opacity 0.15s, border-color 0.15s;
  }
  .line-label:has(input:not(:checked)) .line-badge {
    opacity: 0.25;
  }
  .line-label:has(input:checked) .line-badge {
    border-color: white;
  }
  .sel-actions {
    display: flex; gap: 10px; flex-wrap: wrap;
    justify-content: center;
  }
  .sel-toggle-btn {
    background: transparent; color: white;
    border: 1px solid rgba(255, 255, 255, 0.4);
    padding: 10px 20px; font-size: 0.95em;
    border-radius: 6px; cursor: pointer;
  }
  .sel-toggle-btn:hover { background: rgba(255, 255, 255, 0.1); }
  .sel-start-btn {
    background: #e94560; color: white; border: none;
    padding: 10px 28px; font-size: 1em; font-weight: 600;
    border-radius: 6px; cursor: pointer;
  }
  .sel-start-btn:hover:not(:disabled) { background: #ff5773; }
  .sel-start-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* results-btn: shown in header when game has ended and explore mode is active */
  #results-btn {
    display: none;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.35);
    color: white; padding: 4px 12px;
    font-size: 0.82em; font-weight: 600;
    border-radius: 4px; cursor: pointer; white-space: nowrap;
  }
  #results-btn:hover { background: rgba(255,255,255,0.25); }

  /* per-line stats table inside end screen */
  .stats-section { width: 100%; max-width: 420px; margin: 4px 0 20px; }
  .stats-controls {
    display: flex; gap: 6px; justify-content: center;
    margin-bottom: 10px; flex-wrap: wrap;
  }
  .sort-btn {
    background: rgba(255,255,255,0.1); color: white;
    border: 1px solid rgba(255,255,255,0.25);
    padding: 5px 14px; font-size: 0.82em;
    border-radius: 4px; cursor: pointer;
  }
  .sort-btn.active { background: rgba(255,255,255,0.28); border-color: rgba(255,255,255,0.6); }
  .sort-btn:hover:not(.active) { background: rgba(255,255,255,0.18); }
  #copy-btn {
    background: rgba(255,255,255,0.1); color: white;
    border: 1px solid rgba(255,255,255,0.25);
    padding: 5px 14px; font-size: 0.82em;
    border-radius: 4px; cursor: pointer; margin-left: 4px;
  }
  #copy-btn:hover { background: rgba(255,255,255,0.2); }
  .stats-rows { display: flex; flex-direction: column; gap: 5px; }
  .stat-row {
    display: flex; align-items: center; gap: 8px; font-size: 0.85em;
  }
  .stat-badge {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 44px; height: 26px; padding: 0 8px;
    border-radius: 13px; font-weight: 700; font-size: 0.82em; flex: 0 0 auto;
  }
  .stat-bar-wrap {
    flex: 1; height: 7px; background: rgba(255,255,255,0.12);
    border-radius: 4px; overflow: hidden; min-width: 40px;
  }
  .stat-bar { height: 100%; border-radius: 4px; }
  .stat-nums {
    flex: 0 0 auto; font-variant-numeric: tabular-nums;
    opacity: 0.9; min-width: 86px; text-align: right; font-size: 0.88em;
  }

  @media (max-width: 480px) {
    #prompt { font-size: 1.25em; }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-top">
      <h1>Quiz Métro Parisien</h1>
      <div style="display:flex;align-items:center;gap:10px">
        <button id="results-btn" type="button">Résultats</button>
        <div id="timer">00:00</div>
      </div>
    </div>
    <div class="prompt-row">
      <button id="prev-btn" class="nav-btn" type="button" aria-label="Question précédente">‹</button>
      <div id="prompt">Chargement…</div>
      <button id="next-btn" class="nav-btn" type="button" aria-label="Question suivante">›</button>
    </div>
    <div id="score">&nbsp;</div>
  </header>
  <div id="map" class="loading"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
(function () {
  'use strict';

  const PARIS_CENTER = [48.8566, 2.3522];

  const promptEl = document.getElementById('prompt');
  const scoreEl  = document.getElementById('score');
  const mapEl    = document.getElementById('map');
  const timerEl     = document.getElementById('timer');
  const prevBtn     = document.getElementById('prev-btn');
  const nextBtn     = document.getElementById('next-btn');
  const resultsBtn  = document.getElementById('results-btn');

  const map = L.map('map', {
    center: PARIS_CENTER,
    zoom: 12,
    minZoom: 11,
    maxZoom: 17,
    maxBounds: [[48.70, 2.05], [49.00, 2.70]],
    maxBoundsViscosity: 0.8,
    zoomControl: true,
  });

  // Carto "Positron no labels": light, neutral background with no street
  // names or place labels — keeps the quiz honest.
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
    attribution:
      '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors · ' +
      '© <a href="https://carto.com/attributions">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19,
  }).addTo(map);

  // ---- loaded data ----
  let allLines = [];               // [{ref, colour}] sorted
  let lineLayersByRef = new Map(); // ref -> L.GeoJSON layer
  let dots = new Map();            // name -> {layer, baseStyle, lines, answered}

  // ---- game state ----
  let order = [];
  let index = 0;
  let currentName = null;
  let total = 0;
  let correct = 0;
  let busy = false;
  let timerStart = 0;
  let timerInterval = null;
  let elapsedMs = 0;
  let activeSelectedLines = new Set();
  let endScreenEl = null;

  function sortLineRef(a, b) {
    const na = parseInt(a, 10), nb = parseInt(b, 10);
    if (na !== nb) return na - nb;
    return a.length - b.length;
  }

  function textColorForBg(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return (0.299 * r + 0.587 * g + 0.114 * b) / 255 > 0.55 ? '#1a1a2e' : 'white';
  }

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function fmtTime(ms) {
    const s = Math.floor(ms / 1000);
    return String(Math.floor(s / 60)).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0');
  }

  function startTimer() {
    timerStart = Date.now();
    elapsedMs = 0;
    timerEl.textContent = '00:00';
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      elapsedMs = Date.now() - timerStart;
      timerEl.textContent = fmtTime(elapsedMs);
    }, 250);
  }

  function stopTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = null;
    elapsedMs = Date.now() - timerStart;
    timerEl.textContent = fmtTime(elapsedMs);
  }

  function updateScore() {
    const answered = total - order.length;
    scoreEl.textContent =
      answered + ' / ' + total + ' répondues · ' +
      correct + ' juste' + (correct === 1 ? '' : 's');
  }

  function showPrompt() {
    if (order.length === 0) return;
    if (index < 0) index = order.length - 1;
    if (index >= order.length) index = 0;
    currentName = order[index];
    promptEl.textContent = '« ' + currentName + ' »';
    updateScore();
  }

  function goPrev() {
    if (busy || order.length === 0) return;
    index = (index - 1 + order.length) % order.length;
    showPrompt();
  }

  function goNext() {
    if (busy || order.length === 0) return;
    index = (index + 1) % order.length;
    showPrompt();
  }

  function revealStation(entry, name, isCorrect) {
    entry.layer.setStyle({
      ...entry.baseStyle,
      fillColor: isCorrect ? '#22c55e' : '#e94560',
      color: 'white',
      weight: 2,
      radius: 7,
      fillOpacity: 1,
    });
    entry.layer.bringToFront();
    entry.layer.bindTooltip(name, { direction: 'top', sticky: false });
    entry.answered = true;
    entry.correct = isCorrect;
  }

  function onDotClick(name) {
    if (busy || currentName == null) return;
    if (dots.get(name).answered) return;
    busy = true;

    const correctEntry = dots.get(currentName);
    revealStation(correctEntry, currentName, name === currentName);
    if (name === currentName) correct++;
    updateScore();

    setTimeout(() => {
      busy = false;
      order.splice(index, 1);
      if (order.length === 0) { endGame(); return; }
      showPrompt();
    }, 350);
  }

  prevBtn.addEventListener('click', goPrev);
  nextBtn.addEventListener('click', goNext);
  resultsBtn.addEventListener('click', () => {
    if (endScreenEl) endScreenEl.style.display = 'flex';
  });

  function startGame(selectedLines) {
    activeSelectedLines = selectedLines;
    correct = 0;
    busy = false;
    index = 0;
    prevBtn.disabled = false;
    nextBtn.disabled = false;
    resultsBtn.style.display = 'none';

    if (endScreenEl) { endScreenEl.remove(); endScreenEl = null; }

    for (const { ref } of allLines) {
      const layer = lineLayersByRef.get(ref);
      if (selectedLines.has(ref)) {
        if (!map.hasLayer(layer)) layer.addTo(map);
      } else {
        if (map.hasLayer(layer)) map.removeLayer(layer);
      }
    }

    for (const [, entry] of dots) {
      const inGame = entry.lines.some(l => selectedLines.has(l));
      entry.layer.setStyle(entry.baseStyle);
      entry.layer.unbindTooltip();
      entry.answered = false;
      entry.correct = null;
      if (inGame) {
        if (!map.hasLayer(entry.layer)) entry.layer.addTo(map);
      } else {
        if (map.hasLayer(entry.layer)) map.removeLayer(entry.layer);
      }
    }

    order = shuffle(
      [...dots.entries()]
        .filter(([, e]) => e.lines.some(l => selectedLines.has(l)))
        .map(([name]) => name)
    );
    total = order.length;

    startTimer();
    showPrompt();
  }

  function computeLineStats() {
    return [...activeSelectedLines].sort(sortLineRef).map(ref => {
      let lineTotal = 0, lineCorrect = 0;
      for (const entry of dots.values()) {
        if (!entry.lines.includes(ref)) continue;
        lineTotal++;
        if (entry.correct === true) lineCorrect++;
      }
      const pct = lineTotal > 0 ? Math.round(100 * lineCorrect / lineTotal) : 0;
      const colour = allLines.find(l => l.ref === ref)?.colour || '#666';
      return { ref, lineTotal, lineCorrect, pct, colour };
    });
  }

  function endGame() {
    stopTimer();
    prevBtn.disabled = true;
    nextBtn.disabled = true;
    promptEl.textContent = 'Terminé !';
    scoreEl.textContent = correct + ' / ' + total + ' bonnes réponses';

    const stats = computeLineStats();

    const overlay = document.createElement('div');
    overlay.id = 'end-screen';

    function statsRowsHtml(sorted) {
      return sorted.map(s => {
        const tc = textColorForBg(s.colour);
        return '<div class="stat-row">' +
          '<span class="stat-badge" style="background:' + s.colour + ';color:' + tc + '">' + s.ref + '</span>' +
          '<div class="stat-bar-wrap"><div class="stat-bar" style="width:' + s.pct + '%;background:' + s.colour + '"></div></div>' +
          '<span class="stat-nums">' + s.lineCorrect + ' / ' + s.lineTotal + ' · ' + s.pct + '%</span>' +
          '</div>';
      }).join('');
    }

    function buildText(sorted) {
      const lines = ['Quiz Métro Parisien — ' + correct + ' / ' + total + ' — ' + fmtTime(elapsedMs)];
      for (const s of sorted) {
        lines.push('Ligne ' + s.ref.padEnd(4) + ' : ' + s.lineCorrect + ' / ' + s.lineTotal + '  (' + s.pct + '%)');
      }
      return lines.join('\n');
    }

    overlay.innerHTML =
      '<h2>Terminé !</h2>' +
      '<div class="score-line">' + correct + ' / ' + total + ' bonnes réponses</div>' +
      '<div class="score-line">Temps : ' + fmtTime(elapsedMs) + '</div>' +
      '<div class="stats-section">' +
        '<div class="stats-controls">' +
          '<button class="sort-btn active" id="sort-line-btn" type="button">Par ligne</button>' +
          '<button class="sort-btn" id="sort-pct-btn" type="button">Par réussite</button>' +
          '<button id="copy-btn" type="button">Copier les résultats</button>' +
        '</div>' +
        '<div class="stats-rows" id="stats-rows">' + statsRowsHtml(stats) + '</div>' +
      '</div>' +
      '<div class="end-buttons">' +
        '<button id="replay-btn" type="button">Rejouer</button>' +
        '<button id="explore-btn" type="button">Explorer la carte</button>' +
      '</div>';

    document.body.appendChild(overlay);
    endScreenEl = overlay;
    resultsBtn.style.display = 'inline-block';

    let sortBy = 'line';
    const rowsEl = overlay.querySelector('#stats-rows');
    const sortLineBtn = overlay.querySelector('#sort-line-btn');
    const sortPctBtn = overlay.querySelector('#sort-pct-btn');

    function applySort(by) {
      sortBy = by;
      const sorted = by === 'pct'
        ? [...stats].sort((a, b) => b.pct - a.pct || sortLineRef(a.ref, b.ref))
        : [...stats].sort((a, b) => sortLineRef(a.ref, b.ref));
      rowsEl.innerHTML = statsRowsHtml(sorted);
      sortLineBtn.classList.toggle('active', by === 'line');
      sortPctBtn.classList.toggle('active', by === 'pct');
    }

    sortLineBtn.addEventListener('click', () => applySort('line'));
    sortPctBtn.addEventListener('click', () => applySort('pct'));

    overlay.querySelector('#copy-btn').addEventListener('click', () => {
      const sorted = sortBy === 'pct'
        ? [...stats].sort((a, b) => b.pct - a.pct || sortLineRef(a.ref, b.ref))
        : [...stats].sort((a, b) => sortLineRef(a.ref, b.ref));
      const text = buildText(sorted);
      navigator.clipboard.writeText(text).catch(() => { prompt('Copiez le texte :', text); });
    });

    overlay.querySelector('#replay-btn').onclick = showLineSelection;
    overlay.querySelector('#explore-btn').onclick = () => {
      overlay.style.display = 'none';
    };
  }

  function showLineSelection() {
    const existing = document.getElementById('line-selection');
    if (existing) existing.remove();
    if (endScreenEl) { endScreenEl.remove(); endScreenEl = null; }
    resultsBtn.style.display = 'none';

    const overlay = document.createElement('div');
    overlay.id = 'line-selection';

    const linesHtml = allLines.map(({ ref, colour }) => {
      const tc = textColorForBg(colour);
      return '<label class="line-label">' +
        '<input type="checkbox" class="line-cb" value="' + ref + '" checked>' +
        '<span class="line-badge" style="background:' + colour + ';color:' + tc + '">' + ref + '</span>' +
        '</label>';
    }).join('');

    overlay.innerHTML =
      '<h2>Quiz Métro Parisien</h2>' +
      '<p class="sel-subtitle">Choisissez les lignes à inclure</p>' +
      '<div id="line-grid">' + linesHtml + '</div>' +
      '<div class="sel-actions">' +
        '<button id="sel-toggle-btn" type="button" class="sel-toggle-btn">Tout désélectionner</button>' +
        '<button id="sel-start-btn" type="button" class="sel-start-btn">Commencer</button>' +
      '</div>';

    document.body.appendChild(overlay);

    const checkboxes = overlay.querySelectorAll('.line-cb');
    const startBtn   = overlay.querySelector('#sel-start-btn');
    const toggleBtn  = overlay.querySelector('#sel-toggle-btn');

    function sync() {
      const allChecked = [...checkboxes].every(cb => cb.checked);
      const anyChecked = [...checkboxes].some(cb => cb.checked);
      toggleBtn.textContent = allChecked ? 'Tout désélectionner' : 'Tout sélectionner';
      startBtn.disabled = !anyChecked;
    }

    checkboxes.forEach(cb => cb.addEventListener('change', sync));
    toggleBtn.addEventListener('click', () => {
      const allChecked = [...checkboxes].every(cb => cb.checked);
      checkboxes.forEach(cb => { cb.checked = !allChecked; });
      sync();
    });
    startBtn.addEventListener('click', () => {
      const selected = new Set([...checkboxes].filter(cb => cb.checked).map(cb => cb.value));
      overlay.remove();
      startGame(selected);
    });

    sync();
  }

  function buildStations(stationsGeo, lineColors) {
    for (const f of stationsGeo.features) {
      const isTransfer = f.properties.lines.length > 1;
      const primary = f.properties.lines[0];
      const baseStyle = isTransfer
        ? { radius: 5, fillColor: 'white', color: 'black', weight: 2, opacity: 1, fillOpacity: 1, className: 'station-dot' }
        : { radius: 5, fillColor: lineColors[primary] || '#666', color: 'white', weight: 2, opacity: 1, fillOpacity: 1, className: 'station-dot' };
      const latlng = [f.geometry.coordinates[1], f.geometry.coordinates[0]];
      const dot = L.circleMarker(latlng, baseStyle);
      const name = f.properties.name;
      dot.on('click', (ev) => { L.DomEvent.stopPropagation(ev); onDotClick(name); });
      dot.addTo(map);
      dots.set(name, { layer: dot, baseStyle, lines: f.properties.lines, answered: false });
    }
  }

  Promise.all([
    fetch('./metro-quiz/lines.geojson').then(r => r.json()),
    fetch('./metro-quiz/stations.geojson').then(r => r.json()),
  ]).then(([linesGeo, stationsGeo]) => {
    const lineColorMap = {};
    const refsSeen = new Set();
    for (const f of linesGeo.features) {
      lineColorMap[f.properties.ref] = f.properties.colour;
      refsSeen.add(f.properties.ref);
    }
    allLines = [...refsSeen].sort(sortLineRef).map(ref => ({ ref, colour: lineColorMap[ref] }));

    for (const { ref, colour } of allLines) {
      const features = linesGeo.features.filter(f => f.properties.ref === ref);
      lineLayersByRef.set(ref, L.geoJSON(
        { type: 'FeatureCollection', features },
        { style: { color: colour, weight: 4, opacity: 0.7, interactive: false } }
      ).addTo(map));
    }

    buildStations(stationsGeo, lineColorMap);
    mapEl.classList.remove('loading');
    showLineSelection();
  }).catch(err => {
    promptEl.textContent = 'Erreur de chargement';
    scoreEl.textContent = String(err);
  });
})();
</script>
